<div class="row row-cols-1 row-cols-md-4 g-4">
    <div class="col" *ngFor="let r of recipes">
    <div class="card">
      <img src={{r.image}} class="card-img-top" alt="...">
      <div class="card-body">
        <h5 class="card-title">{{r.name}}</h5>
        <ul>
            <li *ngFor="let i of r.ingredients">{{i}}</li>
        </ul>
      </div>
    </div>
  </div>
</div>
